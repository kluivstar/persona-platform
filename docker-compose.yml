version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: persona_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  pubsub-init:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    volumes:
      - ./infrastructure/setup-pubsub.sh:/setup-pubsub.sh
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GOOGLE_CLOUD_PROJECT=sincere-axon-463104-g2
    entrypoint: /bin/bash
    command: /setup-pubsub.sh
    depends_on:
      - pubsub-emulator

  api:
    build: 
      context: ./api
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://user:password@postgres:5432/persona_platform
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GOOGLE_CLOUD_PROJECT=sincere-axon-463104-g2
      - PUBSUB_TOPIC=events
    ports:
      - "4000:3000"
    depends_on:
      - postgres
      - pubsub-emulator
      - pubsub-init

  worker:
    build:
      context: ./worker
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/persona_platform
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GOOGLE_CLOUD_PROJECT=sincere-axon-463104-g2
      - PUBSUB_TOPIC=events
      - PUBSUB_SUBSCRIPTION=event-worker-sub

      # 🔑 Vertex AI authentication
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json

    volumes:
      # 🔑 Mount service account key into container
      - ./gcp-key.json:/app/gcp-key.json:ro

    depends_on:
      - postgres
      - pubsub-emulator
      - pubsub-init

  frontend:
    build:
      context: ./frontend/nextjs-dashboard
      args:
        NEXT_PUBLIC_API_URL: http://api:3000
        NEXT_PUBLIC_AI_ENABLED: "true"
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api

volumes:
  postgres_data: